name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      major_version:
        description: "Bump major version (increment only). Leave empty to keep current."
        required: false
        type: string
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  convert:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install SwiftDraw
        run: brew install swiftdraw

      - name: Run conversion
        run: node Scripts/convert.mjs

      - name: Upload converted files
        uses: actions/upload-artifact@v7
        with:
          name: converted
          path: |
            Symbols/
            Sources/LucideIcon/LucideIcon+All.swift
            Sources/LucideIcon/Resources/
          retention-days: 1

      - name: Save Lucide version
        run: |
          cd .tmp-lucide/repo 2>/dev/null && git log -1 --format="%H %ci" > /tmp/lucide-version.txt || echo "unknown" > /tmp/lucide-version.txt

      - name: Upload Lucide version
        uses: actions/upload-artifact@v7
        with:
          name: lucide-version
          path: /tmp/lucide-version.txt
          retention-days: 1

  test-and-release:
    needs: [convert]
    if: always()
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download converted files
        if: needs.convert.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: converted

      - name: Download Lucide version
        if: needs.convert.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: lucide-version
          path: /tmp

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # --- Release (only after successful conversion with changes) ---------

      - name: Check for changes against latest release
        if: needs.convert.result == 'success'
        id: changes
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git tag --list '[0-9]*' --sort=-v:refname | head -n1)
          fi

          if [ -z "$LATEST_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No existing release found, will create first release."
          elif ! git diff --quiet "$LATEST_TAG" -- Symbols/ SVGs/ Sources/ Package.swift Scripts/; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected since $LATEST_TAG."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $LATEST_TAG, skipping release."
          fi

      - name: Determine version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          LUCIDE_INFO=$(cat /tmp/lucide-version.txt | tr -d '[:space:]' | head -c 40)

          # Use date-based versioning: MAJOR.YYMM.DD
          YEAR_MONTH=$(date +%y%m)
          DAY=$(date +%d)

          # Use gh to list releases
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git tag --list '[0-9]*' --sort=-v:refname | head -n1)
          fi

          if [ -n "$LATEST_TAG" ]; then
            CURRENT_MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
          else
            CURRENT_MAJOR=0
          fi

          INPUT_MAJOR="${{ github.event.inputs.major_version }}"
          if [ -n "$INPUT_MAJOR" ]; then
            if [ "$INPUT_MAJOR" -lt "$CURRENT_MAJOR" ] 2>/dev/null; then
              echo "::error::major_version ($INPUT_MAJOR) must be >= current ($CURRENT_MAJOR)"
              exit 1
            fi
            MAJOR="$INPUT_MAJOR"
          elif [ "$CURRENT_MAJOR" -eq 0 ]; then
            MAJOR=1
          else
            MAJOR="$CURRENT_MAJOR"
          fi

          TAG="${MAJOR}.${YEAR_MONTH}.${DAY}"

          # Safety: if this tag already exists, bump patch
          SUFFIX=0
          BASE_TAG="$TAG"
          while git tag --list "$TAG" | grep -q . || gh release view "$TAG" &>/dev/null; do
            SUFFIX=$((SUFFIX + 1))
            TAG="${BASE_TAG}.${SUFFIX}"
          done

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "lucide_info=$LUCIDE_INFO" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (lucide commit: $LUCIDE_INFO)"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Symbols/ Sources/ SVGs/ index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update symbols — ${{ steps.version.outputs.tag }}"
            git push
          fi

      - name: Create release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.version.outputs.tag }}"

          cd Symbols
          zip -r ../LucideIcon-symbols.zip .
          cd ..

          cat > /tmp/release-notes.md << 'EOF'
          Auto-converted from [lucide-icons/lucide](https://github.com/lucide-icons/lucide).

          ## Install via SPM

          ```
          https://github.com/lcandy2/LucideIcon.git
          ```

          ## Usage
          ```swift
          import LucideIcon

          Image(lucide: .heart)
          Image(lucide: .alarm_clock)

          // UIKit
          let image = UIImage(lucide: .heart)
          ```
          EOF

          gh release create "$RELEASE_TAG" \
            --title "LucideIcon $RELEASE_TAG" \
            --notes-file /tmp/release-notes.md \
            LucideIcon-symbols.zip
